<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Triangle</title>
  </head>
  <body onload="InitWebGL()">
    <canvas id="glCanvas" width="800px" height="600px">
      WebGL is not supported
    </canvas>
    <textarea id="vertexShader" spellcheck="false">
        precision mediump float;
        attribute vec3 Pos;
        attribute vec3 Color;
        attribute vec2 UV;
        attribute vec3 Normal;
        uniform vec4 Angle;
        varying vec3 vertexColor;
        varying vec2 uv;
        varying vec3 normal;
        void main()
        {
            float coX = cos(Angle.x);
            float siX = sin(Angle.x);
            mat4 matX = mat4(vec4(1.0, 0.0, 0.0, 0.0),
                             vec4(0.0, coX, siX, 0.0),
                             vec4(0.0,-siX, coX, 0.0),
                             vec4(0.0, 0.0, 0.0, 1.0));
            float coY = cos(Angle.y);
            float siY = sin(Angle.y);
            mat4 matY = mat4(vec4(coY, 0.0,-siY, 0.0),
                             vec4(0.0, 1.0, 0.0, 0.0),
                             vec4(siY, 0.0, coY, 0.0),
                             vec4(0.0, 0.0, 0.0, 1.0));
            gl_Position = matY * matX * vec4(Pos, 1.0);
            vertexColor = Color;
            uv = UV;
            normal = mat3(matX * matY) * Normal;
        }
    </textarea>
    <textarea id="fragmentShader" spellcheck="false">
        precision mediump float;
        uniform sampler2D Texture;
        uniform vec4 Display;
        varying vec3 vertexColor;
        varying vec2 uv;
        varying vec3 normal;
        void main()
        {
            vec3 lightDirection = vec3(0.0, 0.0, 1.0);
            float lambert = dot(lightDirection, normal);
            vec3 shade = Display.rgb * lambert;
            float p = abs(Display.w);
            vec3 texture = texture2D(Texture, uv).rgb;
            vec3 color = vertexColor;
            gl_FragColor = vec4(mix(color, texture, p) * shade * 2.0, 1.0);
        }
    </textarea>
    <select id="shape" onchange="InitShaders()">
      <option selected>Triangle</option>
      <option>Quad</option>
      <option>Box</option>
      <option>Cylinder</option>
    </select>
    <input type="checkbox" id="t" onchange="Update()" />
    Show Texture<input
      type="color"
      id="light"
      value="#f6b73c"
      onchange="Update()"
    />Light Color<br />
    <div id="ui">Generate UI for geometry here!</div>
    <script src="js/webgl.js" defer></script>
  </body>
</html>
