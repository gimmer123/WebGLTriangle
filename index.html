<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Triangle</title>
  </head>
  <body onload="InitWebGL()">
    <canvas id="glCanvas" width="800px" height="600px">
      WebGL is not supported
    </canvas>
    <textarea id="vertexShader" spellcheck="false">
        precision mediump float;
        attribute vec3 Pos;
        attribute vec3 Color;
        attribute vec2 UV;
        attribute vec3 Normal;
        uniform mat4 mX;
        uniform mat4 mY;
        uniform mat4 Projection;
        uniform mat4 ModelView;
        varying vec3 vertexColor;
        varying vec2 uv;
        varying vec3 normal;
        void main()
        {
            
            gl_Position = Projection * ModelView * mY * mX * vec4(Pos, 1.0);
            vertexColor = Color;
            uv = UV;
            normal = mat3(mY * mX) * Normal;
        }
    </textarea>
    <textarea id="fragmentShader" spellcheck="false">
        precision mediump float;
        uniform sampler2D Texture;
        uniform vec4 Display;
        varying vec3 vertexColor;
        varying vec2 uv;
        varying vec3 normal;
        void main()
        {
            vec3 lightDirection = vec3(0.0, 0.0, 1.0);
            float lambert = dot(lightDirection, normal);
            vec3 shade = Display.rgb * lambert;
            float p = abs(Display.w);
            vec3 texture = texture2D(Texture, uv).rgb;
            vec3 color = vertexColor;
            gl_FragColor = vec4(mix(color, texture, p) * shade, 1.0);
        }
    </textarea>
    <select id="shape" onchange="InitShaders()">
      <option selected>Triangle</option>
      <option>Quad</option>
      <option>Box</option>
      <option>Cylinder</option></select
    ><br />
    <input type="number" id="fov" value="90" onchange="Render()" />
    FOV<br /><input type="number" id="zoom" value="1.2" onchange="Render()" />
    Zoom<br />
    <input type="checkbox" id="t" onchange="Update()" />
    Show Texture<input
      type="color"
      id="light"
      value="#f6b73c"
      onchange="Update()"
    />Light Color<br />
    <div id="ui">Generate UI for geometry here!</div>
    <script src="js/webgl.js" defer></script>
  </body>
</html>
